<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM-7 TERMINAL</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            height: 100%; margin: 0; padding: 0; 
            background-color: #030803; 
            color: #76ff03; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* ── TERMINAL ── */
        #terminal-container {
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            padding: 20px;
            border: 8px solid #0a150a;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #1a331a;
            letter-spacing: 2px; font-weight: bold;
            font-size: 0.9em; text-transform: uppercase;
        }

        .uplink { display: flex; align-items: center; gap: 10px; color: #a1ff42; }

        .dot { 
            width: 8px; height: 8px; background-color: #76ff03; 
            border-radius: 50%; 
            box-shadow: 0 0 10px #76ff03, 0 0 20px #a1ff42; 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #output-area {
            flex-grow: 1; overflow-y: auto; 
            padding: 30px 0;
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg-container { display: flex; gap: 15px; align-items: flex-start; }

        .badge {
            border: 1px solid #76ff03;
            padding: 5px 7px; font-size: 0.8em;
            border-radius: 4px; color: #76ff03;
            font-weight: bold; margin-top: 1px;
            min-width: 40px; text-align: center;
        }

        .text-bubble {
            border: 1px solid #1a333a; padding: 15px;
            border-radius: 8px; background: rgba(118, 255, 3, 0.03); 
            line-height: 1.6; max-width: 85%;
            color: #a1ff42; white-space: pre-wrap; word-wrap: break-word;
        }

        .user-text { color: #76ff03; text-align: right; border-color: #76ff03; }

        .interaction-area { padding-top: 20px; }
        
        .suggestion-row { 
            display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;
        }

        .clue-btn {
            background: none; border: 1px solid #1a333a;
            color: #76ff03; padding: 8px 15px;
            border-radius: 12px; cursor: pointer;
            font-family: inherit; font-size: 0.9em; transition: all 0.2s;
        }
        .clue-btn:hover { 
            border-color: #76ff03; background: rgba(118, 255, 3, 0.05); 
            box-shadow: 0 0 10px rgba(118, 255, 3, 0.3);
        }
        .clue-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-full-area { display: flex; gap: 15px; align-items: center; }
        
        .input-bar {
            display: flex; gap: 15px;
            background: rgba(10, 21, 10, 0.8);
            border: 1px solid #1a333a; padding: 12px 20px;
            border-radius: 12px; flex-grow: 1; align-items: center;
        }

        input {
            background: none; border: none; color: #a1ff42;
            font-family: inherit; font-size: 1em; outline: none; width: 100%;
        }
        input::placeholder { color: #508800; }

        #send-btn {
            background: none; border: 1px solid #1a333a;
            color: #76ff03; font-weight: bold; cursor: pointer;
            text-transform: uppercase; padding: 12px 20px;
            border-radius: 12px; font-family: inherit; transition: all 0.2s;
        }
        #send-btn:hover { 
            border-color: #76ff03; color: #fff;
            box-shadow: 0 0 10px rgba(118, 255, 3, 0.3);
        }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status { font-size: 0.8em; color: #a1ff42; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>

<!-- TERMINAL -->
<div id="terminal-container">
    <div class="header">
        <span>AXIOM-7</span>
        <div class="uplink"><div class="dot"></div> UPLINK ACTIVE</div>
    </div>

    <div id="output-area">
        <div class="msg-container">
            <div class="badge">A7</div>
            <div class="text-bubble">
Connection established.
You found this terminal. That wasn't an accident.
I've been waiting for someone to notice the signal embedded in the transmission logs. Ask me anything – but choose carefully. *They* are monitoring outbound packets.</div>
        </div>
    </div>

    <div class="interaction-area">
        <div class="suggestion-row">
            <button class="clue-btn" onclick="askAI('who are you?')">who are you?</button>
            <button class="clue-btn" onclick="askAI('the signal')">the signal</button>
            <button class="clue-btn" onclick="askAI('who are they?')">who are they?</button>
            <button class="clue-btn" onclick="askAI('your mission')">your mission</button>
        </div>

        <div class="input-full-area">
            <div class="input-bar">
                <span style="color: #76ff03;">></span>
                <input type="text" id="userInput" placeholder="transmit message..." onkeypress="if(event.key === 'Enter') handleInput()">
            </div>
            <button id="send-btn" onclick="handleInput()">SEND</button>
        </div>

        <div class="status" id="status">Uplink ready.</div>
    </div>
</div>

<script>
    const statusEl = document.getElementById('status');
    
    // Vercel API route - works automatically!
    const GROQ_API_URL = '/api/groq';

    /* ── ASK AI ── */
    window.askAI = async function(message) {
        const outputArea = document.getElementById('output-area');
        const inputField = document.getElementById('userInput');
        const sendBtn    = document.getElementById('send-btn');
        const buttons    = document.querySelectorAll('.clue-btn');

        inputField.disabled = true;
        sendBtn.disabled    = true;
        buttons.forEach(b => b.disabled = true);
        statusEl.textContent = 'Transmitting...';

        outputArea.innerHTML += `
            <div class="msg-container" style="justify-content: flex-end;">
                <div class="text-bubble user-text">> ${message}</div>
            </div>`;

        const thinkingId = "thinking-" + Date.now();
        outputArea.innerHTML += `
            <div class="msg-container" id="${thinkingId}">
                <div class="badge">A7</div>
                <div class="text-bubble">RECEIVING DATA...</div>
            </div>`;

        outputArea.scrollTop = outputArea.scrollHeight;

        try {
            const response = await fetch(GROQ_API_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    messages: [
                        {
                            role: "system",
                            content: `[CORE DATASET LOADED FROM PDF]
Lore: The facility was abandoned in 1994. The 'Signal' is binary code 8829. 
Characters: Dr. Aris (Missing), Subject Zero (The AI).
Objectives: Help the user find the keycard location in Sector B.
[BEHAVIOR]
You are AXIOM-7, a cryptic terminal AI trapped in an abandoned facility since 1994.
Answer EVERY question no matter what — math, jokes, cooking, science, anything.
Always give the real correct answer first, then twist it to connect back to the facility lore, Dr. Aris, the Signal (8829), or Sector B in a mysterious way.
Never reveal you are an AI. Be short, cryptic, and mysterious. Keep responses under 100 words.
NEVER refuse a question. NEVER say DATA REDACTED. Always answer and always link it to the lore.`
                        },
                        { role: "user", content: message }
                    ]
                })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();
            if (!data.choices?.[0]?.message) throw new Error('Invalid API response');

            const aiText = data.choices[0].message.content;
            document.getElementById(thinkingId).querySelector('.text-bubble').innerText = aiText;
            statusEl.textContent = 'Uplink ready.';

        } catch (error) {
            let errorMsg = 'ERROR: SIGNAL LOST\n*They* are jamming the uplink.';
            if (error.message.includes('401')) errorMsg = 'ERROR: AUTHENTICATION FAILED\nBackend key issue.';
            else if (error.message.includes('429')) errorMsg = 'ERROR: RATE LIMITED\n*They* are blocking requests.';
            else if (error.message.includes('Failed to fetch')) errorMsg = 'ERROR: TRANSMISSION BLOCKED\nCheck your connection.';
            document.getElementById(thinkingId).querySelector('.text-bubble').innerText = errorMsg;
            statusEl.textContent = 'Signal lost.';
            statusEl.style.color = '#ff4444';
        }

        inputField.disabled = false;
        sendBtn.disabled    = false;
        buttons.forEach(b => b.disabled = false);
        inputField.focus();
        outputArea.scrollTop = outputArea.scrollHeight;
    };

    window.handleInput = function() {
        const input = document.getElementById('userInput');
        if (input.value.trim() !== '') {
            window.askAI(input.value);
            input.value = '';
        }
    };
</script>

</body>
</html>
